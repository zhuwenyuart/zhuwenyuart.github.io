<!doctype html>
<html class="no-js" lang="zxx">

<head>
	<meta charset="utf-8">
	<meta http-equiv="x-ua-compatible" content="ie=edge">
	<title>艺术画廊|| 朱文语</title>
	<meta name="description" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- Favicon -->
	<link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">

	<!-- all css here -->
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="css/bootstrap.min.css">        <!-- boostrap核心库 -->
	<link rel="stylesheet" href="css/magnific-popup.css">       <!-- 图片放大弹窗插件 -->
	<link rel="stylesheet" href="css/meanmenu.css">             <!-- 移动端菜单插件 -->
	<link rel="stylesheet" href="css/shortcode/shortcodes.css"> <!-- 主题快捷样式组件库 -->
	<link rel="stylesheet" href="css/responsive.css">           <!-- 响应式布局插件，页面适应不同尺寸 -->

	<link rel="stylesheet" href="css/et-line-fonts.css">        <!-- 图标库 -->
	<link rel="stylesheet" href="css/eleganticons-fonts.css">   <!-- 图标库 -->

	<!-- 可选 -->
	<link rel="stylesheet" href="css/animate.css">              <!-- 动画库 -->
	<link rel="stylesheet" href="css/owl.carousel.css">         <!-- 轮播图插件 -->
	<!-- <script src="js/vendor/modernizr-2.8.3.min.js"></script> -->

	
</head>

<body>
    <!-- portfolio area start -->
    <div class="portfolio-area ptb-90">
        <div class="container">
            <div class="portfolio-menu portfolio2-menu mb-50 home-three">
                <!-- 分类按钮将通过JavaScript动态生成 -->
            </div>
            <div class="grid portfolio-style-3 home-3">
                <div class="row">
                    <!-- 图片内容将通过JavaScript动态生成 -->
                </div>
            </div>
            <div class="view-more text-center">
                <a href="single-portfolio.html">view more</a>
            </div>
        </div>

	<!-- all js here -->
	<script src="js/vendor/jquery-1.12.0.min.js"></script>  <!-- jQuery核心库 -->
	<script src="js/isotope.pkgd.min.js"></script>          <!-- 实现瀑布流和过滤功能 -->
	<script src="js/imagesloaded.pkgd.min.js"></script>     <!-- 检测图片加载完成，确保布局准确 -->
	<script src="js/jquery.meanmenu.js"></script>           <!-- 移动端响应式菜单 -->

	<!-- <script src="js/bootstrap.min.js"></script>             boostrap核心库 -->
	<!-- <script src="js/owl.carousel.min.js"></script>          轮播图插件 -->

	<script>
        const artworks = [
            {
                "path": "image/light/birthday.jpg",
                "name": "光-生日蜡烛",
                "category": "light",
                "des": "烛光摇曳的生日场景，温暖色调表现"
            },
            {
                "path": "image/light/carousel.jpg",
                "name": "光-旋转木马",
                "category": "light",
                "des": "夜景中的旋转木马灯光研究"
            },
            {
                "path": "image/eye/cat.jpg",
                "name": "眼-猫眼",
                "category": "eye",
                "des": "猫科动物瞳孔的细节刻画"
            },
            {
                "path": "image/eye/sheep.jpg",
                "name": "眼-羊眼",
                "category": "eye",
                "des": "温顺动物的眼部特征表现"
            },
            {
                "path": "image/other/westlake.jpg",
                "name": "西湖春光",
                "category": "other",
                "des": "杭州西湖春季风光水彩写生"
            },
            {
                "path": "image/other/christmas.jpg",
                "name": "圣诞",
                "category": "other",
                "des": "节日气氛的抽象色彩表达"
            }
        ];

        // 生成分类按钮
        function generateFilters() {
            const categories = [...new Set(artworks.map(item => item.category))];
            const filterContainer = document.querySelector('.portfolio-menu');
            
            // 清空原有按钮
            filterContainer.innerHTML = '';
            
            // 添加"全部"按钮
            const allButton = document.createElement('button');
            allButton.className = 'active';
            allButton.dataset.filter = '*';
            allButton.textContent = '全部';
            filterContainer.appendChild(allButton);

            // 添加分类按钮
            categories.forEach(category => {
                const button = document.createElement('button');
                button.dataset.filter = `.${category}`;
                
                // 转换分类名称显示
                const nameMap = {
                    light: '光影',
                    eye: '眼睛',
                    other: '其他'
                };
                button.textContent = nameMap[category] || category;
                filterContainer.appendChild(button);
            });
        }

        // 生成图片项目
        function generatePortfolioItems() {
            const portfolioContainer = document.querySelector('.grid .row');
            
            artworks.forEach(art => {
                const itemHTML = `
                    <div class="col-lg-6 col-md-6 col-xs-12 grid-item ${art.category}">
                        <div class="portfolio hover-style-4">
                            <a href="#">
                                <img src="${art.path}" alt="${art.name}" />
                            </a>
                            <div class="portfolio-3-icon">
                                <a href="single-portfolio.html">
                                    <i class="icon_link"></i>
                                </a>
                                <a class="img-poppu" href="${art.path}">
                                    <i class="icon_zoom-in_alt"></i>
                                </a>
                            </div>
                            <div class="portfolio-title3">
                                <h3><a href="#">${art.name}</a></h3>
                                <span>${art.des}</span>
                            </div>
                        </div>
                    </div>
                `;
                portfolioContainer.insertAdjacentHTML('beforeend', itemHTML);
            });
        }

        // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
        generateFilters();
        generatePortfolioItems();

        // 使用imagesLoaded确保图片加载完成
		$('.grid').imagesLoaded(function() {
            // 仅保留一个初始化入口
            var $grid = $('.grid').isotope({
                itemSelector: '.grid-item',
                percentPosition: true,
                masonry: {
                    columnWidth: '.grid-item'
                }
            });

            // 添加过滤事件
            $('.portfolio-menu').on('click', 'button', function() {
                var filterValue = $(this).attr('data-filter');
                $grid.isotope({ filter: filterValue });
                $(this).addClass('active').siblings().removeClass('active');
            });
        });
    });
    </script>
</body>

</html>
